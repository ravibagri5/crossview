suite: test deployment configuration
templates:
  - deployment.yaml
tests:
  - it: should inject environment variables from ConfigMap
    set:
      secrets:
        dbPassword: test-password
        sessionSecret: test-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: RELEASE-NAME-crossview-config
                key: DB_HOST
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OIDC_ISSUER
            valueFrom:
              configMapKeyRef:
                name: RELEASE-NAME-crossview-config
                key: OIDC_ISSUER
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SAML_ENABLED
            valueFrom:
              configMapKeyRef:
                name: RELEASE-NAME-crossview-config
                key: SAML_ENABLED

  - it: should use existing ConfigMap when config.ref is set
    set:
      config:
        ref: existing-configmap
      secrets:
        dbPassword: test-password
        sessionSecret: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: existing-configmap
                key: DB_HOST

  - it: should inject secrets from chart-created secret (plain strings)
    set:
      secrets:
        dbPassword: my-db-password
        sessionSecret: my-session-secret
        OIDCClientSecret: my-oidc-secret
        adminUsername: test-admin
        adminPassword: test-admin-pass
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-crossview-secrets
                key: dbpassword
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SESSION_SECRET
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-crossview-secrets
                key: sessionsecret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-crossview-secrets
                key: oidcclientsecret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ADMIN_USERNAME
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-crossview-secrets
                key: adminusername
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-crossview-secrets
                key: adminpassword

  - it: should inject secrets from external secrets (secretKeyRef)
    set:
      secrets:
        dbPassword:
          secretKeyRef:
            name: my-prod-db
            key: db-pass-key
        sessionSecret:
          secretKeyRef:
            name: my-prod-session
            key: session-key
        OIDCClientSecret:
          secretKeyRef:
            name: my-oidc
            key: client-secret-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: my-prod-db
                key: db-pass-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SESSION_SECRET
            valueFrom:
              secretKeyRef:
                name: my-prod-session
                key: session-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-oidc
                key: client-secret-key

  - it: should not mount config volume (no file mounting)
    set:
      secrets:
        dbPassword: test-password
        sessionSecret: test-secret
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name == 'config')]
      - notExists:
          path: spec.template.spec.volumes[?(@.name == 'config')]

  - it: should set correct replica count
    set:
      app:
        replicas: 5
      secrets:
        dbPassword: test-password
        sessionSecret: test-secret
    asserts:
      - equal:
          path: spec.replicas
          value: 5

  - it: should use init container with ConfigMap env vars
    set:
      secrets:
        dbPassword: test-password
        sessionSecret: test-secret
    asserts:
      - exists:
          path: spec.template.spec.initContainers
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: DB_PORT
            valueFrom:
              configMapKeyRef:
                name: RELEASE-NAME-crossview-config
                key: DB_PORT