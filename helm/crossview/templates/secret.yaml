{{- $secrets := .Values.secrets | default dict -}}

# DEBUG: Secret template loaded
# DEBUG: .Values.secrets = {{ .Values.secrets | toYaml | quote }}
# DEBUG: Number of keys: {{ len $secrets }}
# DEBUG: Keys: {{ keys $secrets | join ", " }}

{{- $hasStringValues := false -}}
{{- range $key, $val := $secrets -}}
  {{- if $val -}}  # truthy check (even empty string is truthy here)
    {{- if not (kindIs "map" $val) -}}
      {{- $hasStringValues = true -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

# DEBUG: hasStringValues = {{ $hasStringValues }}

{{- if $hasStringValues }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crossview.fullname" . }}-secrets
  namespace: {{ include "crossview.namespace" . }}
  labels:
    {{- include "crossview.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $originalKey, $value := $secrets }}
    {{- if $value -}}
      {{- if not (kindIs "map" $value) -}}
  {{- $key := $originalKey | lower | replace "OIDCClientSecret" "oidc-client-secret" | replace "SAMLCert" "saml-cert" | replace "dbPassword" "db-password" | replace "sessionSecret" "session-secret" | replace "adminUsername" "admin-username" | replace "adminPassword" "admin-password" }}
  {{ $key }}: {{ $value | quote }}
      {{- end -}}
    {{- end -}}
  {{- end }}
{{- else }}
# DEBUG: Skipping Secret creation - no plain string values detected
{{- end }}