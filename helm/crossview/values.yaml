# Default values for crossview
# This is a YAML-formatted file.

# Global settings
global:
  namespace: crossview
  createNamespace: true

# Image configuration
image:
  repository: ghcr.io/crossplane-contrib/crossview
  pullPolicy: Always
  tag: ""
  platform: ""

# Application configuration
app:
  name: crossview
  port: 3001
  replicas: 1
  extraEnv: []
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

# Deployment strategy
deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

# Resource limits and requests
# Defaults are set for typical clusters. If the pod is OOMKilled when opening the dashboard,
# increase memory (e.g. 1Gi–2Gi); see docs/TROUBLESHOOTING.md#oomkilled-when-opening-the-dashboard.
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# Health checks
healthCheck:
  livenessProbe:
    httpGet:
      path: /api/health
      port: 3001
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /api/health
      port: 3001
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 3001
  sessionAffinity: ClientIP
  sessionAffinityTimeout: 10800
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: crossview.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Database configuration
database:
  enabled: true
  image:
    repository: postgres
    tag: "latest"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 999
    capabilities:
      drop:
        - ALL

# Configuration
config:
  ref: ""
  database:
    enabled: true
    host: ""
    port: 5432
    database: crossview
    username: postgres
    ssl:
        mode: disable
        rootCert: ""
        cert: ""
        key: ""
  server:
    port: 3001
    auth:
      mode: session
      trustedHeader: X-Auth-User
      createUsers: true
      defaultRole: viewer
    log:
      level: info
    cors:
      # Public root URL of this Crossview instance (no trailing slash).
      # IMPORTANT: Change this to your actual ingress host in production.
      # This value is used as the post-SSO-login redirect destination. If left
      # as localhost, users will be redirected to localhost after SSO authentication.
      origin: http://localhost:5173
      credentials: true
    session:
      cookie:
        secure: false
        httpOnly: true
        maxAge: 86400000

  # SSO configuration (example values provided, but SSO is disabled by default)
  # sso:
  #   oidc:
  #     enabled: true
  #     issuer: http://localhost:8080/realms/crossview
  #     clientId: crossview-client
  #     authorizationURL: ""
  #     tokenURL: ""
  #     userInfoURL: ""
  #     callbackURL: http://localhost:3001/api/auth/oidc/callback
  #     scope: openid profile email
  #     usernameAttribute: preferred_username
  #     emailAttribute: email
  #     firstNameAttribute: given_name
  #     lastNameAttribute: family_name
  #   saml:
  #     enabled: true
  #     entryPoint: http://localhost:8080/realms/crossview/protocol/saml
  #     issuer: crossview
  #     callbackURL: http://localhost:3001/api/auth/saml/callback
  #     usernameAttribute: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name
  #     emailAttribute: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress
  #     firstNameAttribute: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/givenname
  #     lastNameAttribute: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/surname
  sso:
    oidc:
      enabled: false
    saml:
      enabled: false

  vite:
    server:
      proxy:
        api:
          target: http://localhost:3001
          changeOrigin: true

# Secrets configuration
# - Plain string: chart creates a secret with that value
# - Object with secretKeyRef: references an existing secret (no creation)
secrets:
  adminUsername: "admin"
  adminPassword: "password"
  dbPassword: ""
  sessionSecret: ""
  OIDCClientSecret: ""
  SAMLCert: ""

  # Production override example: use existing secrets instead of chart-created ones
  # dbPassword:
  #   secretKeyRef:
  #     name: prod-crossview-secrets
  #     key: db-password
  # sessionSecret:
  #   secretKeyRef:
  #     name: prod-crossview-secrets
  #     key: session-secret
  # OIDCClientSecret:
  #   secretKeyRef:
  #     name: oidc-credentials
  #     key: client-secret

# Service Account
serviceAccount:
  create: true
  name: crossview-sa
  annotations: {}

# RBAC
rbac:
  create: true
  clusterRole:
    name: crossview-role
  clusterRoleBinding:
    name: crossview-binding

# Pod affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - crossview
          topologyKey: kubernetes.io/hostname

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Pod annotations (applied to app pods)
podAnnotations: {}

# Pod labels (applied to app pods)
podLabels: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10