name: Build and Release

on:
  push:
    branches:
      - main
      - pre-release
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'public/images/**'
      - 'LICENSE'
      - 'helm/**'
      - '.github/workflows/helm-release.yml'
      - '.github/workflows/security-scan.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      update_github_pages:
        description: 'Update GitHub Pages Helm repository'
        required: false
        default: false
        type: boolean

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    outputs:
      is_version_bump: ${{ steps.check.outputs.is_version_bump }}
    steps:
      - name: Check if this is a version bump commit
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ -n "$COMMIT_MSG" ]] && [[ "$COMMIT_MSG" =~ ^[Bb]ump\ version ]]; then
            echo "is_version_bump=true" >> $GITHUB_OUTPUT
            echo "Skipping release - this is a version bump commit"
          else
            echo "is_version_bump=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: check-version-bump
    if: needs.check-version-bump.outputs.is_version_bump != 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    permissions:
      contents: write
      packages: write
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go tests
        working-directory: crossview-go-server
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu || true

      - name: Run npm audit
        run: |
          echo "Checking for npm vulnerabilities..."
          npm audit --audit-level=moderate || echo "⚠️ Some vulnerabilities found, but continuing build"

      - name: Build application
        run: npm run build

      - name: Fetch all tags
        run: |
          git fetch --tags --force
          echo "All tags:"
          git tag --list "v*" | sort -V

      - name: Calculate next version
        id: version
        run: |
          git fetch --tags --force
          BRANCH="${GITHUB_REF##*/}"

          LATEST_STABLE=$(git tag --list "v*" | grep -v "-" | sort -V | tail -n1)
          echo "Latest stable tag: $LATEST_STABLE"

          if [ -z "$LATEST_STABLE" ]; then
            BASE_VERSION="0.1.0"
          else
            VERSION=${LATEST_STABLE#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            if [ "$MAJOR" = "0" ]; then
              if [ "$MINOR" -lt 9 ]; then
                BASE_VERSION="0.$((MINOR+1)).0"
              else
                BASE_VERSION="1.0.0"
              fi
            else
              if [ "$MINOR" -lt 9 ]; then
                BASE_VERSION="$MAJOR.$((MINOR+1)).0"
              else
                BASE_VERSION="$((MAJOR+1)).0.0"
              fi
            fi
          fi

          if [ "$BRANCH" = "pre-release" ]; then
            EXISTING_RC=$(git tag --list "v${BASE_VERSION}-rc.*" | sort -V | tail -n1)

            if [ -z "$EXISTING_RC" ]; then
              RC_NUMBER=1
            else
              LAST_RC=${EXISTING_RC##*.}
              RC_NUMBER=$((LAST_RC+1))
            fi

            NEW_VERSION="${BASE_VERSION}-rc.${RC_NUMBER}"
            IS_PRERELEASE=true
          else
            NEW_VERSION="${BASE_VERSION}"
            IS_PRERELEASE=false
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          echo "New version: $NEW_VERSION"

      - name: Update package.json version
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
          echo "Updated package.json to version ${{ steps.version.outputs.version }}"

      - name: Update Helm Chart.yaml
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" helm/crossview/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.tag }}\"/" helm/crossview/Chart.yaml
          sed -i "s|ghcr.io/crossplane-contrib/crossview:[0-9]\+\.[0-9]\+\.[0-9]\+|ghcr.io/crossplane-contrib/crossview:${{ steps.version.outputs.tag }}|" helm/crossview/Chart.yaml
          echo "Updated Chart.yaml:"
          cat helm/crossview/Chart.yaml

      - name: Update README.md version references
        run: |
          echo "README.md version references updated (if any)"

      - name: Update docs/HELM_DEPLOYMENT.md version references
        run: |
          sed -i "s/v0\.[0-9]\+\.[0-9]\+/v${{ steps.version.outputs.version }}/g" docs/HELM_DEPLOYMENT.md || true
          sed -i "s/v1\.[0-9]\+\.[0-9]\+/v${{ steps.version.outputs.version }}/g" docs/HELM_DEPLOYMENT.md || true
          echo "Updated HELM_DEPLOYMENT.md"

      - name: Update helm/crossview/README.md version references
        run: |
          sed -i "s/v0\.[0-9]\+\.[0-9]\+/v${{ steps.version.outputs.version }}/g" helm/crossview/README.md || true
          sed -i "s/v1\.[0-9]\+\.[0-9]\+/v${{ steps.version.outputs.version }}/g" helm/crossview/README.md || true
          echo "Updated helm/crossview/README.md"

      - name: Generate changelog and release notes
        run: |
          npx --yes conventional-changelog-cli@5.0.0 -p angular -i CHANGELOG.md -s
          if head -1 CHANGELOG.md | grep -q '^## \['; then
            { echo '# Changelog'; echo ''; cat CHANGELOG.md; } > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
          fi
          npx --yes conventional-changelog-cli@5.0.0 -p angular -u -o RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "## Release ${{ steps.version.outputs.tag }}" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "No conventional-commit entries since the last tag." >> RELEASE_NOTES.md
          fi

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          retention-days: 14

      - name: Commit version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json helm/crossview/Chart.yaml CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "Bump version to ${{ steps.version.outputs.version }}"
            git push origin HEAD:${{ github.ref_name }} || {
              echo "Failed to push version update. This may be due to branch protection."
              echo "The release will proceed, but Chart.yaml in the repo may be out of sync."
              echo "Consider manually updating Chart.yaml or adjusting branch protection rules."
            }
          fi

  build-docker-images:
    needs: [check-version-bump, build-and-release]
    if: needs.check-version-bump.outputs.is_version_bump != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set version and arch from previous job
        id: vars
        run: |
          echo "version=${{ needs.build-and-release.outputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=${{ needs.build-and-release.outputs.tag }}" >> $GITHUB_OUTPUT
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "platform_tag=$PLATFORM_TAG" >> $GITHUB_OUTPUT
          if [ "${{ matrix.platform }}" = "linux/amd64" ]; then
            echo "arch=amd64" >> $GITHUB_OUTPUT
          else
            echo "arch=arm64" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image (single arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/crossview:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.platform_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/crossview:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.platform_tag }}
          build-args: |
            TARGETPLATFORM=${{ matrix.platform }}
            TARGETARCH=${{ steps.vars.outputs.arch }}
            TARGETOS=linux
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/crossview:buildcache-${{ steps.vars.outputs.platform_tag }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/crossview:buildcache-${{ steps.vars.outputs.platform_tag }},mode=max
          outputs: type=image,push=true

  create-multi-arch-manifest:
    needs: [check-version-bump, build-and-release, build-docker-images]
    if: needs.check-version-bump.outputs.is_version_bump != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set version from previous job
        id: version
        run: |
          echo "version=${{ needs.build-and-release.outputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=${{ needs.build-and-release.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest to GHCR
        run: |
          docker buildx imagetools create --tag ghcr.io/${{ github.repository_owner }}/crossview:${{ steps.version.outputs.tag }} \
            ghcr.io/${{ github.repository_owner }}/crossview:${{ steps.version.outputs.tag }}-linux-amd64 \
            ghcr.io/${{ github.repository_owner }}/crossview:${{ steps.version.outputs.tag }}-linux-arm64
          
          echo "Multi-arch manifest created for GHCR: ${{ steps.version.outputs.tag }}"

      - name: Create and push multi-arch manifest to Docker Hub
        run: |
          docker buildx imagetools create --tag ${{ secrets.DOCKERHUB_USERNAME }}/crossview:${{ steps.version.outputs.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/crossview:${{ steps.version.outputs.tag }}-linux-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/crossview:${{ steps.version.outputs.tag }}-linux-arm64
          
          echo "Multi-arch manifest created for Docker Hub: ${{ steps.version.outputs.tag }}"

  create-release:
    needs: [check-version-bump, build-and-release, create-multi-arch-manifest]
    if: needs.check-version-bump.outputs.is_version_bump != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from previous job
        id: version
        run: |
          echo "version=${{ needs.build-and-release.outputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=${{ needs.build-and-release.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-notes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release-notes/RELEASE_NOTES.md
          files: release-notes/RELEASE_NOTES.md
          draft: false
          prerelease: ${{ needs.build-and-release.outputs.is_prerelease }}
          fail_on_unmatched_files: true

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'

      - name: Update Helm Chart.yaml with version
        run: |
          CHART_VERSION="${{ steps.version.outputs.version }}"
          CHART_TAG="${{ steps.version.outputs.tag }}"
          sed -i "s/^version:.*/version: $CHART_VERSION/" helm/crossview/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$CHART_TAG\"/" helm/crossview/Chart.yaml
          sed -i "s|ghcr.io/crossplane-contrib/crossview:v[0-9]\+\.[0-9]\+\.[0-9]\+|ghcr.io/crossplane-contrib/crossview:$CHART_TAG|" helm/crossview/Chart.yaml
          echo "Updated Chart.yaml to version $CHART_VERSION (appVersion: $CHART_TAG):"
          cat helm/crossview/Chart.yaml

      - name: Package Helm chart
        run: |
          mkdir -p ./charts
          helm package helm/crossview --destination ./charts
          echo "Chart package created:"
          ls -la ./charts/
          CHART_FILE=$(ls ./charts/*.tgz | head -1)
          echo "CHART_FILE=$CHART_FILE" >> $GITHUB_ENV
          echo "Using chart file: $CHART_FILE"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install ORAS
        run: |
          curl -LO https://github.com/oras-project/oras/releases/download/v1.3.0/oras_1.3.0_linux_amd64.tar.gz
          tar -xzf oras_1.3.0_linux_amd64.tar.gz
          sudo mv oras /usr/local/bin/
          oras version

      - name: Create Helm config file for OCI push
        run: |
          CHART_VERSION="${{ steps.version.outputs.version }}"
          CHART_NAME=$(grep '^name:' helm/crossview/Chart.yaml | awk '{print $2}')
          CHART_DESC=$(grep '^description:' helm/crossview/Chart.yaml | sed 's/^description: //' | sed 's/"/\\"/g')
          
          printf '{\n  "name": "%s",\n  "version": "%s",\n  "description": "%s"\n}\n' \
            "$CHART_NAME" "$CHART_VERSION" "$CHART_DESC" > ./charts/helm-config.json
          
          cat ./charts/helm-config.json

      - name: Login to GHCR with ORAS
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Push Helm chart to GHCR OCI registry using ORAS
        run: |
          CHART_VERSION="${{ steps.version.outputs.version }}"
          OCI_REGISTRY="ghcr.io"
          OCI_REPO="${{ github.repository_owner }}/crossview-chart"
          
          if [ -z "$CHART_FILE" ]; then
            CHART_FILE=$(ls ./charts/*.tgz | head -1)
          fi
          
          if [ ! -f "$CHART_FILE" ]; then
            echo "Error: Chart file not found: $CHART_FILE"
            echo "Available files in ./charts/:"
            ls -la ./charts/ || echo "charts/ directory does not exist"
            exit 1
          fi
          
          echo "Pushing Helm chart to OCI registry: oci://$OCI_REGISTRY/$OCI_REPO"
          echo "Chart version: $CHART_VERSION"
          echo "Chart file: $CHART_FILE"
          
          oras push $OCI_REGISTRY/$OCI_REPO:$CHART_VERSION \
            --artifact-type application/vnd.cncf.helm.chart.v1.tar+gzip \
            --config ./charts/helm-config.json:application/vnd.cncf.helm.config.v1+json \
            $CHART_FILE:application/tar+gzip || {
            echo "First push attempt failed, retrying..."
            sleep 5
            oras push $OCI_REGISTRY/$OCI_REPO:$CHART_VERSION \
              --artifact-type application/vnd.cncf.helm.chart.v1.tar+gzip \
              --config ./charts/helm-config.json:application/vnd.cncf.helm.config.v1+json \
              $CHART_FILE:application/tar+gzip
          }
          
          echo "Chart pushed successfully to GHCR OCI registry"
          echo "Users can install with: helm install crossview oci://$OCI_REGISTRY/$OCI_REPO --version ${{ steps.version.outputs.tag }}"

      - name: Login to Docker Hub with ORAS
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | oras login docker.io \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Push Helm chart to Docker Hub OCI registry using ORAS
        run: |
          CHART_VERSION="${{ steps.version.outputs.version }}"
          OCI_REGISTRY="docker.io"
          OCI_REPO="${{ secrets.DOCKERHUB_USERNAME }}/crossview-chart"
          
          if [ -z "$CHART_FILE" ]; then
            CHART_FILE=$(ls ./charts/*.tgz | head -1)
          fi
          
          if [ ! -f "$CHART_FILE" ]; then
            echo "Error: Chart file not found: $CHART_FILE"
            echo "Available files in ./charts/:"
            ls -la ./charts/ || echo "charts/ directory does not exist"
            exit 1
          fi
          
          echo "Pushing Helm chart to OCI registry: oci://$OCI_REGISTRY/$OCI_REPO"
          echo "Chart version: $CHART_VERSION"
          echo "Chart file: $CHART_FILE"
          
          oras push $OCI_REGISTRY/$OCI_REPO:$CHART_VERSION \
            --artifact-type application/vnd.cncf.helm.chart.v1.tar+gzip \
            --config ./charts/helm-config.json:application/vnd.cncf.helm.config.v1+json \
            $CHART_FILE:application/tar+gzip || {
            echo "First push attempt failed, retrying..."
            sleep 5
            oras push $OCI_REGISTRY/$OCI_REPO:$CHART_VERSION \
              --artifact-type application/vnd.cncf.helm.chart.v1.tar+gzip \
              --config ./charts/helm-config.json:application/vnd.cncf.helm.config.v1+json \
              $CHART_FILE:application/tar+gzip
          }
          
          echo "Chart pushed successfully to Docker Hub OCI registry"
          echo "Users can install with: helm install crossview oci://$OCI_REGISTRY/$OCI_REPO --version ${{ steps.version.outputs.tag }}"

      - name: Checkout gh-pages branch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_github_pages == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Initialize gh-pages if empty
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_github_pages == 'true'
        run: |
          if [ ! -f gh-pages/index.yaml ]; then
            echo "Initializing gh-pages branch"
            cd gh-pages
            echo "apiVersion: v1" > index.yaml
            echo "entries: {}" >> index.yaml
            mkdir -p charts
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.yaml
            git commit -m "Initial Helm chart repository" || true
            git push origin gh-pages || true
          fi

      - name: Create charts directory if it doesn't exist
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_github_pages == 'true'
        run: |
          mkdir -p gh-pages/charts
          mkdir -p gh-pages/images

      - name: Copy new chart package and logo
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_github_pages == 'true'
        run: |
          cp charts/*.tgz gh-pages/charts/
          cp public/images/crossview-logo.svg gh-pages/images/crossview-logo.svg
          cp public/images/helm-logo.svg gh-pages/images/helm-logo.svg

      - name: Update Helm repository index
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_github_pages == 'true'
        run: |
          cd gh-pages
          helm repo index . --url https://crossplane-contrib.github.io/crossview
          cat index.yaml

      - name: Create index.html for GitHub Pages
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_github_pages == 'true'
        run: |
          cd gh-pages
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Crossview Helm Charts</title>
            <meta name="description" content="Official Helm chart repository for Crossview">
            <style>
              :root {
                --natural-50:  #fafaf9;
                --natural-100: #f5f5f4;
                --natural-200: #e7e5e4;
                --natural-300: #d6d3d1;
                --natural-400: #a8a29e;
                --natural-500: #78716c;
                --natural-600: #57534e;
                --natural-700: #44403c;
                --natural-800: #292524;
                --natural-900: #1c1917;
                --natural-950: #0c0a09;
                --bg:        var(--natural-50);
                --text:      var(--natural-900);
                --muted:     var(--natural-600);
                --accent:    var(--natural-800);
              }
              body {
                margin: 0;
                background: var(--bg);
                color: var(--text);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                line-height: 1.6;
                min-height: 100vh;
              }
              .container {
                max-width: 840px;
                margin: 0 auto;
                padding: 100px 24px 140px;
              }
              header {
                text-align: center;
                margin-bottom: 90px;
              }
              .logo {
                width: 150px;
                height: 150px;
                margin-bottom: 28px;
                opacity: 0.9;
              }
              h1 {
                font-size: 3rem;
                font-weight: 600;
                margin: 0 0 12px 0;
                color: var(--accent);
              }
              .tagline {
                font-size: 1.2rem;
                color: var(--muted);
              }
              h2 {
                font-size: 1.5rem;
                margin: 64px 0 20px 0;
                color: var(--accent);
                display: flex;
                align-items: center;
                gap: 12px;
              }
              h2::before {
                content: "$";
                color: #16a34a;
                font-weight: bold;
              }
              pre {
                background: var(--natural-100);
                color: var(--natural-900);
                padding: 28px;
                border-radius: 12px;
                font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
                font-size: 15.5px;
                line-height: 1.6;
                overflow-x: auto;
                position: relative;
                margin: 0;
                border: 1px solid var(--natural-200);
              }
              .copy {
                position: absolute;
                top: 14px;
                right: 16px;
                background: var(--natural-200);
                color: var(--natural-800);
                border: 1px solid var(--natural-300);
                padding: 6px 12px;
                border-radius: 6px;
                font-size: 13px;
                cursor: pointer;
                opacity: 0;
                transition: opacity 0.2s;
              }
              pre:hover .copy { opacity: 1; }
              .copy:hover { background: var(--natural-300); }
              .footer {
                text-align: center;
                margin-top: 120px;
                color: var(--muted);
                font-size: 0.95rem;
              }
              .footer a {
                color: var(--accent);
                text-decoration: none;
              }
              .footer a:hover { text-decoration: underline; }
              @media (max-width: 640px) {
                .container { padding: 60px 16px; }
                h1 { font-size: 2.4rem; }
                pre { padding: 20px; }
              }
            </style>
          </head>
          <body>
            <div class="container">
              <header>
                <img src="images/crossview-logo.svg" alt="Crossview" class="logo">
                <h1>Crossview Helm Charts</h1>
                <p class="tagline">Official Helm repository for Crossview – Crossplane visualization platform</p>
              </header>
              <h2>Install from OCI Registry (Recommended)</h2>
              <pre><code id="oci-install">helm install crossview oci://ghcr.io/crossplane-contrib/crossview-chart \
          --namespace crossview \
          --create-namespace</code>
                <button class="copy" onclick="copy(this)">Copy</button>
              </pre>
              <h2>Add Helm Repository</h2>
              <pre><code id="add">helm repo add crossview https://crossplane-contrib.github.io/crossview
          helm repo update</code>
                <button class="copy" onclick="copy(this)">Copy</button>
              </pre>
              <h2>Install from Repository</h2>
              <pre><code id="install">helm install crossview crossview/crossview \
          --namespace crossview \
            --create-namespace</code>
                <button class="copy" onclick="copy(this)">Copy</button>
              </pre>
              <h2>Upgrade</h2>
              <pre><code id="upgrade">helm upgrade crossview crossview/crossview \
            --namespace crossview</code>
                <button class="copy" onclick="copy(this)">Copy</button>
              </pre>
              <div class="footer">
                <p>
                  <a href="https://github.com/crossplane-contrib/crossview" target="_blank">GitHub</a> •
                  <a href="index.yaml">index.yaml</a> •
                  Hosted on GitHub Pages
                </p>
              </div>
            </div>
            <script>
              function copy(btn) {
                const code = btn.previousElementSibling.textContent.trim();
                navigator.clipboard.writeText(code).then(() => {
                  const original = btn.textContent;
                  btn.textContent = "Copied!";
                  setTimeout(() => btn.textContent = original, 1500);
                });
              }
            </script>
          </body>
          </html>
          EOF

      - name: Create Artifact Hub repository metadata
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_github_pages == 'true'
        run: |
          cd gh-pages
          cat > artifacthub-repo.yml << 'EOF'
          repositoryID: d73e91d5-f8ca-4b1a-bea7-b274f432462c
          EOF
          echo "Created artifacthub-repo.yml:"
          cat artifacthub-repo.yml

      - name: Clean up gh-pages branch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_github_pages == 'true'
        run: |
          cd gh-pages
          find . -type f ! -name 'index.yaml' ! -name 'index.html' ! -name 'artifacthub-repo.yml' ! -name '*.tgz' ! -name 'README.md' ! -name '*.svg' ! -path './charts/*' ! -path './images/*' ! -path './.git/*' -delete 2>/dev/null || true
          find . -type d ! -name '.git' ! -name 'charts' ! -name 'images' ! -name '.' -empty -delete 2>/dev/null || true
          rm -rf dist build config logs node_modules src public .github 2>/dev/null || true
          mkdir -p charts images

      - name: Commit and push to gh-pages
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_github_pages == 'true'
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin gh-pages --rebase || git pull origin gh-pages --no-rebase || true
          git checkout gh-pages || git checkout -b gh-pages
          git add .
          git clean -fd -e .git || true
          if git diff --staged --quiet && git diff --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Helm chart to version ${{ steps.version.outputs.version }}"
            git push origin gh-pages || git push origin gh-pages --force-with-lease
          fi
